<div role="main" class="map">
  @if (apiLoaded) {
    <google-map
      [height]="height"
      [width]="width"
      [zoom]="zoom"
      [center]="center"
      [options]="options"
      >
      @for (marker of markers; track marker) {
        <map-advanced-marker
          #markerElem
          [position]="marker.position"
        ></map-advanced-marker>
      }
    </google-map>
  }
</div>
